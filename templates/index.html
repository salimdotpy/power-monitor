{% extends 'layout.html' %} {% block content %}
<div class="bg-white rounded-lg shadow-lg py-4">
  <h3 class="px-4 pb-2 border-b-2 font-bold">Power Status</h3>
  <div class="px-4 pt-4 flex flex-col gap-4 justify-center items-center text-center">
    <div
      class="text-4xl flex items-center justify-center p-3 bg-gren-200 size-20 rounded-full border-2 border-slate-600"
      id="statusIcon">
      <span class="size-8 rounded-full border-t-2 border-r-2 border-blue-400 inline-block animate-spin"></span>
    </div>
    <p id="status">Detecting status...</p>
    <button id="lockBtn"
      class="border bg-blue-700 rounded-lg text-white px-4 py-1.5 transition-all hover:bg-blue-500 active:bg-blue-700 "
      disabled>Checking
      compatibility...</button>
    <!-- <div id="wakeStatus">Checking system...</div> -->
  </div>
</div>
<div class="bg-white rounded-lg shadow-lg mt-5 overflow-hidden">
  <a href="{{ url_for('logs_route' ) }}" class="flex items-center p-4 gap-2 hover:bg-slate-50">
    <span class="text-3xl">📑</span>
    <span>Log records</span>
  </a>

  <a href="{{ url_for('settings_route' ) }}" class="flex items-center p-4 gap-2 hover:bg-slate-50">
    <span class="text-3xl">⚙️</span>
    <span>Settings</span>
  </a>

  <a href="{{ url_for('index_route' ) }}" class="flex items-center p-4 gap-2 hover:bg-slate-50">
    <span class="text-3xl">ℹ️</span>
    <span>Developers Information</span>
  </a>
</div>
{% endblock %}
